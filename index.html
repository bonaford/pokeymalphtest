<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jumping Character</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #202124;
      --shadow: rgba(32, 33, 36, 0.24);
      --panel: rgba(255, 255, 255, 0.84);
      --malph-ratio: 356 / 446;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #d8eefb url("./background.png") center center / cover no-repeat;
      touch-action: manipulation;
      user-select: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(255, 255, 255, 0.1), rgba(20, 30, 40, 0.18));
      pointer-events: none;
    }

    .scoreboard {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 2px solid rgba(32, 33, 36, 0.18);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 24px var(--shadow);
      backdrop-filter: blur(8px);
      font-weight: 700;
    }

    .score {
      min-width: 2ch;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 2;
      max-width: min(280px, calc(100vw - 32px));
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 24px var(--shadow);
      font-size: 14px;
      line-height: 1.35;
    }

    .character {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(15vw, 112px);
      height: auto;
      aspect-ratio: var(--malph-ratio);
      border: 0;
      padding: 0;
      background: transparent;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: left 260ms cubic-bezier(.2, .8, .2, 1), top 260ms cubic-bezier(.2, .8, .2, 1);
      filter: drop-shadow(0 12px 10px var(--shadow));
      -webkit-tap-highlight-color: transparent;
      z-index: 1;
      will-change: left, top;
    }

    .character:focus-visible {
      outline: 4px solid #118ab2;
      outline-offset: 8px;
      border-radius: 16px;
    }

    .character-sprite {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      animation: hover 2.2s ease-in-out infinite;
      transform-origin: center bottom;
      transition: transform 180ms ease;
      will-change: transform;
    }

    .character.is-jumping .character-sprite {
      transform: translateY(-8px) scale(1.08) rotate(-4deg);
    }

    .character img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    #malph-image,
    #malph-tail,
    #malph-pupil {
      position: absolute;
      inset: 0;
    }

    #malph-tail {
      z-index: 0;
    }

    #malph-image {
      z-index: 1;
    }

    #malph-pupil {
      z-index: 2;
    }

    .malph-pupil {
      pointer-events: none;
      transform: translate(0, 0);
      transition: transform 220ms ease;
      will-change: transform;
    }

    .malph-pupil.is-hidden {
      opacity: 0;
    }

    .malph-tail {
      pointer-events: none;
      transform-origin: 56% 62%;
      animation: tailBreathe 6.4s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes hover {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes tailBreathe {
      0%,
      100% {
        transform: translateX(-1px) translateY(1px) rotate(-5deg);
      }

      50% {
        transform: translateX(1px) translateY(-1px) rotate(1deg);
      }
    }

    @media (max-width: 520px) {
      .character {
        width: min(27vw, 96px);
      }
    }
  </style>
</head>
<body>
  <div class="scoreboard" aria-live="polite">
    <span>Jumps</span>
    <span class="score" id="score">0</span>
  </div>

  <button class="character" id="character" type="button" aria-label="Make the character jump">
    <span class="character-sprite">
      <img class="malph-tail" id="malph-tail" src="./tail.png" alt="">
      <img id="malph-image" src="./character-open-nopupil.png" alt="">
      <img class="malph-pupil" id="malph-pupil" src="./pupil.png" alt="">
    </span>
  </button>

  <div class="hint">Click or tap the character. Every touch sends them somewhere new.</div>

  <script>
    const character = document.querySelector("#character");
    const malphTail = document.querySelector("#malph-tail");
    const malphImage = document.querySelector("#malph-image");
    const malphPupil = document.querySelector("#malph-pupil");
    const score = document.querySelector("#score");
    const openImage = "./character-open-nopupil.png";
    const blinkImage = "./character-blink.png";
    let jumps = 0;
    let blinkTimeoutId;
    let lookTimeoutId;

    function setPupilOffset(x, y) {
      malphPupil.style.transform = `translate(${x}px, ${y}px)`;
    }

    function scheduleLookAround() {
      const nextLookDelay = randomBetween(900, 2600);
      const positions = [
        { x: 0, y: 0 },
        { x: -2, y: 0 },
        { x: 2, y: 0 },
        { x: -1, y: 1 },
        { x: 1, y: 1 },
        { x: 0, y: -1 }
      ];

      lookTimeoutId = window.setTimeout(() => {
        const nextPosition = positions[Math.floor(Math.random() * positions.length)];
        setPupilOffset(nextPosition.x, nextPosition.y);
        scheduleLookAround();
      }, nextLookDelay);
    }

    function startBlink() {
      window.clearTimeout(blinkTimeoutId);
      malphPupil.classList.add("is-hidden");
      malphImage.src = blinkImage;
      malphTail.src = "./tail.png";
    }

    function endBlink() {
      malphImage.src = openImage;
      malphTail.src = "./tail.png";
      malphPupil.classList.remove("is-hidden");
    }

    function scheduleBlink() {
      const nextBlinkDelay = randomBetween(2200, 5200);
      blinkTimeoutId = window.setTimeout(() => {
        startBlink();

        window.setTimeout(() => {
          endBlink();
          scheduleBlink();
        }, 120);
      }, nextBlinkDelay);
    }

    function randomPosition() {
      const rect = character.getBoundingClientRect();
      const padding = 18;
      const minX = rect.width / 2 + padding;
      const maxX = window.innerWidth - rect.width / 2 - padding;
      const minY = rect.height / 2 + padding;
      const maxY = window.innerHeight - rect.height / 2 - padding;

      return {
        x: randomBetween(minX, Math.max(minX, maxX)),
        y: randomBetween(minY, Math.max(minY, maxY))
      };
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function jump() {
      const next = randomPosition();
      jumps += 1;
      score.textContent = jumps;
      window.clearTimeout(blinkTimeoutId);
      window.clearTimeout(lookTimeoutId);
      setPupilOffset(0, 0);
      startBlink();
      character.style.left = `${next.x}px`;
      character.style.top = `${next.y}px`;
      character.classList.add("is-jumping");
      window.setTimeout(() => {
        character.classList.remove("is-jumping");
        endBlink();
        scheduleLookAround();
        scheduleBlink();
      }, 180);
    }

    character.addEventListener("click", jump);
    scheduleLookAround();
    scheduleBlink();
  </script>
</body>
</html>
